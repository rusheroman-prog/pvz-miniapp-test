<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ПВЗ Узум</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            font-size: 16px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        pre {
            background: rgba(0,0,0,0.05);
            padding: 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h2>Система ПВЗ</h2>
    <p id="status">Инициализация...</p>
    
    <button class="btn" id="loadBtn" style="display: none;" onclick="fetchOrders()">Загрузить заказы</button>
    
    <div id="debug-info">
        <h3>Логи:</h3>
        <pre id="logArea">Ожидание...</pre>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        // ВАШИ ДАННЫЕ ИЗ SUPABASE
        const SUPABASE_URL = 'https://ysvogudznyuszssdriih.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_kU91fqnkt80hbLcVEms6oA_eXKVzY2A'; 
        
        let supabaseClient = null;

        function log(msg) {
            const logArea = document.getElementById('logArea');
            logArea.innerText += '\n' + msg;
            console.log(msg);
        }

        async function authenticate() {
            try {
                const initData = tg.initData;
                
                if (!initData) {
                    document.getElementById('status').innerText = 'Ошибка: Откройте внутри Telegram';
                    log('initData пустой. Приложение открыто в браузере?');
                    return;
                }

                log('1. Отправляем initData в Edge Function...');
                
                const response = await fetch(`${SUPABASE_URL}/functions/v1/auth`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ initData: initData })
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`Ошибка сервера: ${response.status} ${errText}`);
                }

                const data = await response.json();
                
                if (data.token) {
                    log('2. Токен получен! Создаем клиент Supabase...');
                    
                    // Инициализируем Supabase с нашим кастомным JWT
                    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                        global: {
                            headers: {
                                Authorization: `Bearer ${data.token}`
                            }
                        }
                    });

                    // Мы расшифруем токен прямо в браузере, чтобы красиво показать роль
const tokenPayload = JSON.parse(atob(data.token.split('.')[1]));
document.getElementById('status').innerText = `✅ Авторизован (Роль: ${tokenPayload.role || 'Оператор'})`;;
                    document.getElementById('loadBtn').style.display = 'block';
                    log('Готово к работе.');
                } else {
                    throw new Error('Токен не найден в ответе');
                }

            } catch (error) {
                document.getElementById('status').innerText = 'Ошибка авторизации';
                log('Ошибка: ' + error.message);
            }
        }

        async function fetchOrders() {
            if (!supabaseClient) return;
            
            log('Загружаем заказы из БД...');
            try {
                // Пытаемся получить заказы. RLS автоматически отфильтрует их по ПВЗ из токена!
                const { data, error } = await supabaseClient
                    .from('orders')
                    .select('*');

                if (error) throw error;
                
                log(`Найдено заказов: ${data.length}`);
                log(JSON.stringify(data, null, 2));
            } catch (error) {
                log('Ошибка загрузки: ' + error.message);
            }
        }

        // Запускаем авторизацию при старте
        authenticate();
    </script>
</body>
</html>
