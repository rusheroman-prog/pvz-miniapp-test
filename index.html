<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Uzum PVZ - Visa Kapitalbank</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #222222);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-btn: var(--tg-theme-button-color, #7000FF);
            --tg-btn-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-second: var(--tg-theme-secondary-bg-color, #f4f4f5);
            --radius: 12px;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --blue: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--tg-bg); 
            color: var(--tg-text); 
            font-size: 16px;
            /* Отступ снизу для защиты зоны жестов iOS */
            padding-bottom: env(safe-area-inset-bottom); 
        }

        /* ── Шапка и Дашборд ────────────────────────────────────── */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--tg-bg); 
            color: var(--tg-text); 
            font-size: 16px;
            /* Отступ снизу для защиты зоны жестов iOS */
            padding-bottom: env(safe-area-inset-bottom); 
        }
        .header-top { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 10px;
        }
        .header h1 { font-size: 17px; font-weight: 700; }
        .operator-name { font-size: 13px; color: var(--tg-hint); }

        .mini-dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .dash-card {
            background: var(--tg-second); padding: 8px 12px; border-radius: 10px;
            font-size: 11px; display: flex; justify-content: space-between; align-items: center;
        }
        .dash-card b { font-size: 13px; }
        
        .aging-row { 
            grid-column: span 2; display: flex; gap: 4px; margin-top: 4px; 
            padding: 6px; background: var(--tg-second); border-radius: 8px;
        }
        .age-dot { flex: 1; text-align: center; font-size: 9px; color: var(--tg-hint); }
        .age-dot b { display: block; font-size: 11px; color: var(--tg-text); }
        .age-dot.danger b { color: var(--red); }

        /* ── Экраны ─────────────────────────────────────────────── */
        .screen { 
            display: none; 
            padding: 16px; 
            /* Чтобы контент не прилипал к краям на безрамочных телефонах */
            padding-left: calc(16px + env(safe-area-inset-left));
            padding-right: calc(16px + env(safe-area-inset-right));
            min-height: 80vh; 
        }
        .screen.active { display: block; }

        /* ── Меню ───────────────────────────────────────────────── */
        .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        }
        .menu-card {
            background: var(--tg-second); border-radius: var(--radius);
            padding: 24px 16px; text-align: center; cursor: pointer;
            transition: transform 0.1s; border: 2px solid transparent;
        }
        .menu-card:active { transform: scale(0.97); }
        .menu-card.accent { border-color: var(--tg-btn); }
        .menu-card .icon { font-size: 32px; margin-bottom: 8px; }
        .menu-card .label { font-size: 14px; font-weight: 600; }

        /* ── Формы и Инпуты ─────────────────────────────────────── */
        .form-section { background: var(--tg-second); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
        .form-section h3 { font-size: 13px; font-weight: 700; color: var(--tg-hint); text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px;}
        
        .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
        .field-input {
            flex: 1; background: var(--tg-bg); border: 1.5px solid rgba(0,0,0,0.1);
            border-radius: 10px; padding: 12px; font-size: 17px; color: var(--tg-text); outline: none;
        }
        .field-input:focus { border-color: var(--tg-btn); }
        
        .cam-btn {
            width: 48px; height: 48px; background: var(--tg-btn); color: white;
            border: none; border-radius: 10px; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        .btn {
            width: 100%; padding: 14px; background: var(--tg-btn); color: var(--tg-btn-text);
            border: none; border-radius: var(--radius); font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .btn.secondary { background: var(--tg-second); color: var(--tg-text); }
        .btn.danger { background: var(--red); color: #fff; }
        .btn.success { background: var(--green); color: #fff; }

        /* ── Карточки результатов (как в вашем коде) ──────────── */
        .result-card {
            border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: none;
        }
        .result-card.visible { display: block; }
        .result-card.ok { background: #e8f5e9; border: 1.5px solid var(--green); }
        .result-card.err { background: #fce8e8; border: 1.5px solid var(--red); }
        .result-card.info { background: #e3f2fd; border: 1.5px solid var(--blue); }
        .rc-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
        .rc-body { font-size: 14px; opacity: 0.8; }

        /* ── Специфические элементы (Ячейка и Причины) ─────────── */
        .big-cell-display {
            font-size: 42px; font-weight: 800; color: var(--blue);
            text-align: center; padding: 20px 0; letter-spacing: 2px;
        }
        
        .reason-list { display: flex; flex-direction: column; gap: 8px; margin-top: 10px;}
        .reason-btn {
            padding: 14px; background: var(--tg-bg); border: 1.5px solid rgba(0,0,0,0.1);
            border-radius: 10px; text-align: left; font-size: 15px; cursor: pointer;
            color: var(--tg-text);
        }
        .reason-btn.selected { border-color: var(--tg-btn); background: rgba(112, 0, 255, 0.05); }

        /* ── Статистика ─────────────────────────────────────────── */
        .stat-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; }
        .stat-tab {
            padding: 8px 16px; background: var(--tg-second); border-radius: 20px;
            font-size: 13px; font-weight: 600; white-space: nowrap; cursor: pointer;
        }
        .stat-tab.active { background: var(--tg-btn); color: #fff; }
        
        .order-item {
            background: var(--tg-second); border-radius: 10px; padding: 12px; margin-bottom: 8px;
        }
        .order-item-head { display: flex; justify-content: space-between; font-weight: 700; margin-bottom: 4px; }
        .order-item-sub { font-size: 12px; color: var(--tg-hint); }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1 id="pvz-title">ТАШ-TEST</h1>
            <div class="operator-name" id="op-name">👤 Загрузка...</div>
        </div>
        <div class="mini-dashboard">
            <div class="dash-card"><span>🚚 В пути</span> <b id="d-shipped">0</b></div>
            <div class="dash-card"><span>📦 Склад</span> <b id="d-arrived">0</b></div>
            <div class="aging-row">
                <div class="age-dot">до 1д <b id="a-1">0</b></div>
                <div class="age-dot">1-3д <b id="a-3">0</b></div>
                <div class="age-dot">3-5д <b id="a-5">0</b></div>
                <div class="age-dot">5-7д <b id="a-7">0</b></div>
                <div class="age-dot danger">>7д <b id="a-max">0</b></div>
            </div>
        </div>
    </div>

    <div id="scr-main" class="screen active">
        <div class="menu-grid">
            <div class="menu-card accent" onclick="nav('scr-rec')">
                <div class="icon">📥</div>
                <div class="label">Приёмка</div>
            </div>
            <div class="menu-card" onclick="nav('scr-iss')">
                <div class="icon">📤</div>
                <div class="label">Выдача</div>
            </div>
            <div class="menu-card" onclick="nav('scr-ret')">
                <div class="icon">↩️</div>
                <div class="label">Возврат</div>
            </div>
            <div class="menu-card" onclick="nav('scr-stat')">
                <div class="icon">📊</div>
                <div class="label">Статистика</div>
            </div>
        </div>
    </div>

    <div id="scr-rec" class="screen">
        <div class="form-section">
            <h3>Шаг 1 — Номер заказа</h3>
            <div class="input-row">
                <input type="text" id="rec-id" class="field-input" placeholder="Сканируйте или введите">
                <button class="cam-btn" onclick="scan('rec-id', checkRec)">📷</button>
            </div>
            <button class="btn" onclick="checkRec()">Проверить заказ</button>
        </div>

        <div id="rec-res" class="result-card"></div>

        <div id="rec-step2" style="display:none">
            <div class="form-section">
                <h3>Шаг 2 — Размещение</h3>
                <input type="text" id="rec-cell" class="field-input" placeholder="Введите ячейку (напр. А-12)" style="margin-bottom:12px">
                <button class="btn success" onclick="doRec()">✅ Принять и сохранить</button>
            </div>
        </div>
    </div>

    <div id="scr-iss" class="screen">
        <div class="form-section">
            <h3>Поиск заказа клиента</h3>
            <div class="input-row">
                <input type="text" id="iss-id" class="field-input" placeholder="Номер заказа">
                <button class="cam-btn" onclick="scan('iss-id', findIss)">📷</button>
            </div>
            <button class="btn" onclick="findIss()">Найти заказ</button>
        </div>

        <div id="iss-res" class="result-card"></div>

        <div id="iss-confirm" style="display:none">
            <div class="form-section">
                <h3>Заказ на полке:</h3>
                <div class="big-cell-display" id="iss-cell-val">---</div>
                <button class="btn success" onclick="doIss()">✅ Подтвердить выдачу</button>
                <button class="btn secondary" style="margin-top:8px" onclick="nav('scr-main')">Отмена</button>
            </div>
        </div>
    </div>

    <div id="scr-ret" class="screen">
        <div class="form-section">
            <h3>Оформление возврата</h3>
            <div class="input-row">
                <input type="text" id="ret-id" class="field-input" placeholder="Номер заказа">
                <button class="cam-btn" onclick="scan('ret-id', checkRet)">📷</button>
            </div>
            <button class="btn" onclick="checkRet()">Найти для возврата</button>
        </div>

        <div id="ret-res" class="result-card"></div>

        <div id="ret-step2" style="display:none">
            <div class="form-section">
                <h3>Укажите причину:</h3>
                <div class="reason-list" id="reasons">
                    <button class="reason-btn" onclick="selRet('Не тот товар', this)">Не тот товар</button>
                    <button class="reason-btn" onclick="selRet('Брак / Повреждение', this)">Брак / Повреждение</button>
                    <button class="reason-btn" onclick="selRet('Не хватает товара', this)">Не хватает товара</button>
                    <button class="reason-btn" onclick="selRet('Отказ клиента', this)">Отказ клиента</button>
                </div>
                <button class="btn danger" style="margin-top:16px" onclick="doRet()">↩️ Оформить возврат</button>
            </div>
        </div>
    </div>

    <div id="scr-stat" class="screen">
        <div class="stat-tabs">
            <div class="stat-tab active" onclick="stat('ARRIVED_AT_PVZ', this)">На складе</div>
            <div class="stat-tab" onclick="stat('SHIPPED', this)">В пути</div>
            <div class="stat-tab" onclick="stat('COMPLETED', this)">Выданы</div>
            <div class="stat-tab" onclick="stat('RETURNED', this)">Возврат</div>
        </div>
        <div id="stat-list"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        tg.BackButton.onClick(() => nav('scr-main'));
        if (tg.disableVerticalSwipes) tg.disableVerticalSwipes(); // Защита от закрытия
        if (tg.requestFullscreen) tg.requestFullscreen();       // Максимальный экран

    

        // КЛЮЧИ SUPABASE
        const S_URL = "https://ysvogudznyuszssdriih.supabase.co";
        const S_KEY = "sb_publishable_kU91fqnkt80hbLcVEms6oA_eXKVzY2A"; 

        let db = null;
        let orders = [];
        let curRetReason = "";
        let curOrder = null;

        async function init() {
            try {
                const initData = tg.initData;
                const resp = await fetch(`${S_URL}/functions/v1/auth`, {
                    method: 'POST', body: JSON.stringify({ initData })
                });
                const { token } = await resp.json();
                db = window.supabase.createClient(S_URL, S_KEY, {
                    global: { headers: { Authorization: `Bearer ${token}` } }
                });

                // Грузим профиль
                const { data: m } = await db.from('managers').select('*').eq('telegram_id', tg.initDataUnsafe.user.id).single();
                if (m) {
                    document.getElementById('op-name').innerHTML = `👤 <b>${m.name}</b>`;
                    document.getElementById('pvz-title').innerText = Array.isArray(m.pvz_codes) ? m.pvz_codes[0] : m.pvz_codes;
                }
                load();
            } catch (e) { console.error(e); }
        }

        async function load() {
            const { data } = await db.from('orders').select('*');
            orders = data || [];
            updateDash();
        }

        function updateDash() {
            const now = new Date();
            let shipped = 0, arrived = 0, a1=0, a3=0, a5=0, a7=0, aMax=0;

            orders.forEach(o => {
                if(o.status === 'SHIPPED') shipped++;
                if(o.status === 'ARRIVED_AT_PVZ') {
                    arrived++;
                    const diff = Math.floor((now - new Date(o.created_at)) / 86400000);
                    if(diff <= 1) a1++; else if(diff <= 3) a3++; else if(diff <= 5) a5++; else if(diff <= 7) a7++; else aMax++;
                }
            });
            document.getElementById('d-shipped').innerText = shipped;
            document.getElementById('d-arrived').innerText = arrived;
            document.getElementById('a-1').innerText = a1; document.getElementById('a-3').innerText = a3;
            document.getElementById('a-5').innerText = a5; document.getElementById('a-7').innerText = a7;
            document.getElementById('a-max').innerText = aMax;
        }

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            tg.BackButton[id === 'scr-main' ? 'hide' : 'show']();
            // Сброс всех состояний при переходе
            document.getElementById('rec-step2').style.display = 'none';
            document.getElementById('iss-confirm').style.display = 'none';
            document.getElementById('ret-step2').style.display = 'none';
            document.querySelectorAll('.result-card').forEach(r => r.style.display = 'none');
            if(id === 'scr-stat') stat('ARRIVED_AT_PVZ', document.querySelector('.stat-tab'));
            load();
        }

        function scan(inpId, cb) {
            tg.showScanQrPopup({ text: "Сканируйте ШК" }, (txt) => {
                document.getElementById(inpId).value = txt;
                cb(); return true;
            });
        }

        function res(id, type, t, b) {
            const el = document.getElementById(id);
            el.className = `result-card visible ${type}`;
            el.innerHTML = `<div class="rc-title">${t}</div><div class="rc-body">${b}</div>`;
        }

        // ПРИЕМКА
        async function checkRec() {
            const id = document.getElementById('rec-id').value.trim();
            curOrder = orders.find(o => o.order_id === id || o.sku === id);
            if(!curOrder) return res('rec-res', 'err', '❌ Не найден', 'Заказ отсутствует в базе ожидания');
            if(curOrder.status !== 'SHIPPED') return res('rec-res', 'info', 'ℹ️ Уже принят', `Заказ уже на ПВЗ в ячейке ${curOrder.cell || '?'}`);
            
            res('rec-res', 'ok', '✅ Заказ найден', `Клиент: ${curOrder.client_name}<br>Товар: ${curOrder.sku}`);
            document.getElementById('rec-step2').style.display = 'block';
        }
        async function doRec() {
            const cell = document.getElementById('rec-cell').value.trim();
            if(!cell) return tg.showAlert("Укажите ячейку!");
            await db.from('orders').update({ status: 'ARRIVED_AT_PVZ', cell }).eq('order_id', curOrder.order_id);
            tg.HapticFeedback.notificationOccurred('success');
            nav('scr-main');
            tg.showAlert("Принято!");
        }

        // ВЫДАЧА
        async function findIss() {
            const id = document.getElementById('iss-id').value.trim();
            curOrder = orders.find(o => o.order_id === id || o.sku === id);
            if(!curOrder) return res('iss-res', 'err', '❌ Заказ не найден', 'Проверьте номер заказа');
            if(curOrder.status !== 'ARRIVED_AT_PVZ') return res('iss-res', 'err', '❌ Не готов', `Статус: ${curOrder.status}`);

            res('iss-res', 'info', '✅ Найден на складе', `Клиент: ${curOrder.client_name}`);
            document.getElementById('iss-cell-val').innerText = curOrder.cell || '???';
            document.getElementById('iss-confirm').style.display = 'block';
        }
        async function doIss() {
            await db.from('orders').update({ status: 'COMPLETED' }).eq('order_id', curOrder.order_id);
            tg.HapticFeedback.notificationOccurred('success');
            nav('scr-main');
            tg.showAlert("Выдано!");
        }

        // ВОЗВРАТ
        async function checkRet() {
            const id = document.getElementById('ret-id').value.trim();
            curOrder = orders.find(o => o.order_id === id || o.sku === id);
            if(!curOrder) return res('ret-res', 'err', '❌ Не найден', 'Заказ не найден');
            res('ret-res', 'info', '✅ Заказ найден', `Клиент: ${curOrder.client_name}`);
            document.getElementById('ret-step2').style.display = 'block';
        }
        function selRet(r, btn) {
            curRetReason = r;
            document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
        async function doRet() {
            if(!curRetReason) return tg.showAlert("Выберите причину!");
            await db.from('orders').update({ status: 'RETURNED', return_reason: curRetReason }).eq('order_id', curOrder.order_id);
            tg.HapticFeedback.notificationOccurred('error');
            nav('scr-main');
            tg.showAlert("Возврат оформлен");
        }

        // СТАТИСТИКА
        function stat(s, btn) {
            document.querySelectorAll('.stat-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const list = document.getElementById('stat-list');
            list.innerHTML = '';
            const filtered = orders.filter(o => o.status === s);
            if(!filtered.length) list.innerHTML = '<div style="text-align:center; padding:20px; color:#999">Пусто</div>';
            filtered.forEach(o => {
                list.innerHTML += `
                    <div class="order-item">
                        <div class="order-item-head"><span>${o.order_id}</span> <span style="color:var(--blue)">${o.cell||''}</span></div>
                        <div class="order-item-sub">${o.client_name} · ${o.sku}</div>
                        ${o.return_reason ? `<div class="order-item-sub" style="color:var(--red)">${o.return_reason}</div>` : ''}
                    </div>
                `;
            });
        }

        init();
    </script>
</body>
</html>
