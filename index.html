<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Uzum WMS — Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --tg-bg: var(--tg-theme-bg-color, #ffffff);
      --tg-text: var(--tg-theme-text-color, #222222);
      --tg-hint: var(--tg-theme-hint-color, #999999);
      --tg-btn: var(--tg-theme-button-color, #7000FF);
      --tg-second: var(--tg-theme-secondary-bg-color, #f4f4f5);
    }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--tg-second); color: var(--tg-text); margin: 0; padding: 0; }
    .header { background: var(--tg-bg); padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 1px 2px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 18px; margin: 0; font-weight: 800; }
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }
    .search-input { width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); background: var(--tg-bg); color: var(--tg-text); font-size: 16px; box-sizing: border-box; margin-bottom: 15px; outline: none; }
    .card { background: var(--tg-bg); padding: 16px; border-radius: 12px; margin-bottom: 10px; cursor: pointer; border: 1px solid transparent; }
    .card:active { background: var(--tg-second); }
    .card-title { font-weight: 800; color: var(--tg-btn); font-size: 17px; margin-bottom: 4px; }
    .card-sub { font-size: 13px; color: var(--tg-hint); line-height: 1.4; }
    .empty { text-align: center; padding: 40px; color: var(--tg-hint); }
    .btn-reset { font-size: 11px; border: none; background: #eee; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>

<div class="header">
  <h1 id="h-title">UZUM WMS</h1>
  <button id="btn-reset" class="btn-reset" style="display:none;" onclick="resetPvz()">Сменить ПВЗ</button>
</div>

<div id="scr-select" class="screen">
  <input type="text" id="pvz-search" class="search-input" placeholder="Поиск по номеру или адресу..." oninput="filterPvz()">
  <div id="pvz-list"></div>
</div>

<div id="scr-orders" class="screen">
  <div id="order-list"></div>
</div>

<script>
  const tg = window.Telegram.WebApp; tg.expand();
  const S_URL = "https://ysvogudznyuszssdriih.supabase.co";
  const S_KEY = "sb_publishable_kU91fqnkt80hbLcVEms6oA_eXKVzY2A";
  const db = window.supabase.createClient(S_URL, S_KEY);

  let branches = [];
  let myPvz = localStorage.getItem('my_pvz_code');

  async function init() {
    if (!myPvz) {
      showScreen('select');
      await loadBranches();
    } else {
      showOrders();
    }
  }

  async function loadBranches() {
    const list = document.getElementById('pvz-list');
    list.innerHTML = '<div class="empty">Загрузка ПВЗ...</div>';
    
    // Пытаемся получить данные из таблицы branches
    const { data, error } = await db.from('branches').select('*');
    
    if (error) {
      list.innerHTML = `<div class="empty">Ошибка: ${error.message}</div>`;
      return;
    }

    // Универсальный мапинг: понимает и ПВЗ, и code, и Название филиала
    branches = data.map(b => ({
      code: b.code || b['ПВЗ'] || '?',
      addr: b.full_address || b['Название филиала'] || 'Адрес не указан',
      route: b.route_number || b['Маршрут'] || ''
    }));

    renderBranches(branches);
  }

  function renderBranches(items) {
    const cont = document.getElementById('pvz-list');
    if (!items.length) { cont.innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
    cont.innerHTML = items.map(b => `
      <div class="card" onclick="setPvz('${b.code}')">
        <div class="card-title">${b.code} ${b.route ? `<small style="opacity:0.5">(Маршрут ${b.route})</small>` : ''}</div>
        <div class="card-sub">${b.addr}</div>
      </div>
    `).join('');
  }

  function filterPvz() {
    const q = document.getElementById('pvz-search').value.toLowerCase();
    const f = branches.filter(b => b.code.toLowerCase().includes(q) || b.addr.toLowerCase().includes(q));
    renderBranches(f);
  }

  function setPvz(code) {
    localStorage.setItem('my_pvz_code', code);
    myPvz = code;
    showOrders();
  }

  function resetPvz() { localStorage.removeItem('my_pvz_code'); location.reload(); }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('scr-' + id).classList.add('active');
  }

  function showOrders() {
    document.getElementById('h-title').innerText = `ПВЗ ${myPvz}`;
    document.getElementById('btn-reset').style.display = 'block';
    showScreen('orders');
    loadOrders();
  }

  async function loadOrders() {
    const cont = document.getElementById('order-list');
    cont.innerHTML = '<div class="empty">Загрузка заказов...</div>';

    // ВАЖНО: фильтруем по branch_name
    const { data, error } = await db.from('customer_orders')
      .select('*')
      .eq('branch_name', myPvz)
      .order('created_at', { ascending: false });

    if (error) { cont.innerHTML = `<div class="empty">Ошибка: ${error.message}</div>`; return; }
    if (!data.length) { cont.innerHTML = '<div class="empty">📦 Заказов для этого ПВЗ нет</div>'; return; }

    cont.innerHTML = data.map(o => `
      <div class="card" style="cursor:default">
        <div class="card-title">#${o.external_id}</div>
        <div class="card-sub">Статус: <b>${o.status}</b></div>
        <div class="card-sub">Ящик: ${o.box_id || '—'}</div>
      </div>
    `).join('');
  }

  init();
</script>
</body>
</html>
